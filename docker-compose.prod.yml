version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7
    container_name: saviai_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: saviai_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - saviai-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Frontend & API Backend Service (from Docker Hub)
  nextjs-app:
    image: saravanap/saviai-app:1.0
    container_name: saviai_app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:password@mongodb:27017/saviai_db?authSource=admin}
      AI_SERVICE_URL: http://ai-service:5000
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - saviai-network
    restart: unless-stopped

  # AI Service (from Docker Hub)
  ai-service:
    image: saravanap/saviai-ai:1.0
    container_name: saviai_ai_service
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:password@mongodb:27017/saviai_db?authSource=admin}
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - saviai-network
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:

networks:
  saviai-network:
    driver: bridge
